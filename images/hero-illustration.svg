<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400" fill="none">
  <defs>
    <!-- Background Glows -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0" />
    </radialGradient>
    
    <!-- Code Box Gradients -->
    <linearGradient id="box-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Branding Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7E22CE" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="card-shadow" x="-10%" y="-10%" width="125%" height="125%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#0F172A" flood-opacity="0.1" />
    </filter>
    
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background radial glow -->
  <circle cx="250" cy="200" r="250" fill="url(#bg-glow)" />

  <!-- Abstract Graphic Nodes / Grid Grid -->
  <g stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 8">
    <line x1="50" y1="200" x2="450" y2="200" />
    <line x1="250" y1="50" x2="250" y2="350" />
    <circle cx="250" cy="200" r="120" fill="none" stroke-width="0.75" />
    <circle cx="250" cy="200" r="180" fill="none" stroke-width="0.75" />
  </g>

  <!-- Laptop Stand / Base shadow -->
  <ellipse cx="250" cy="340" rx="140" ry="12" fill="#E2E8F0" />
  <ellipse cx="250" cy="336" rx="110" ry="8" fill="#CBD5E1" />

  <!-- Laptop Base -->
  <path d="M 120,326 L 380,326 L 396,334 C 396,336 390,338 380,338 L 120,338 C 110,338 104,336 104,334 Z" fill="#94A3B8" />
  <path d="M 220,326 L 280,326 L 280,331 L 220,331 Z" fill="#64748B" /> <!-- Notch -->

  <!-- Laptop Screen/Monitor Frame -->
  <rect x="136" y="110" width="228" height="216" rx="8" fill="#0F172A" stroke="#475569" stroke-width="3" />
  <rect x="144" y="118" width="212" height="194" rx="4" fill="#1E293B" />
  <circle cx="250" cy="114" r="2" fill="#475569" /> <!-- Camera -->

  <!-- Code on Screen -->
  <!-- Header of code screen -->
  <rect x="144" y="118" width="212" height="24" fill="#0F172A" />
  <circle cx="154" cy="130" r="3" fill="#EF4444" />
  <circle cx="164" cy="130" r="3" fill="#F59E0B" />
  <circle cx="174" cy="130" r="3" fill="#10B981" />
  
  <!-- Dummy Code Syntax Blocks (represented as rounded lines) -->
  <g transform="translate(154, 154)" fill-opacity="0.8">
    <rect x="0" y="0" width="40" height="6" rx="3" fill="#60A5FA" /> <!-- import -->
    <rect x="45" y="0" width="60" height="6" rx="3" fill="#F472B6" /> <!-- module -->
    
    <rect x="0" y="16" width="30" height="6" rx="3" fill="#34D399" /> <!-- const -->
    <rect x="35" y="16" width="50" height="6" rx="3" fill="#FBBF24" /> <!-- codesarthi -->
    <rect x="90" y="16" width="15" height="6" rx="3" fill="#A78BFA" /> <!-- = -->
    
    <rect x="10" y="32" width="75" height="6" rx="3" fill="#F472B6" /> <!-- function init() -->
    
    <rect x="20" y="48" width="60" height="6" rx="3" fill="#93C5FD" /> <!-- console.log -->
    <rect x="85" y="48" width="45" height="6" rx="3" fill="#F472B6" /> <!-- "Success!" -->
    
    <rect x="20" y="64" width="80" height="6" rx="3" fill="#34D399" /> <!-- return ( -->
    
    <!-- Code Bracket Nesting -->
    <rect x="30" y="80" width="90" height="6" rx="3" fill="#FBBF24" />
    <rect x="30" y="96" width="60" height="6" rx="3" fill="#60A5FA" />
    
    <rect x="20" y="112" width="15" height="6" rx="3" fill="#34D399" /> <!-- ) -->
    <rect x="10" y="128" width="8" height="6" rx="3" fill="#FBBF24" /> <!-- } -->
  </g>

  <!-- Interactive/Floating Dashboard Panels (Wow-factor element 1) -->
  <g transform="translate(320, 60)" filter="url(#card-shadow)">
    <!-- Glassmorphism Card -->
    <rect x="0" y="0" width="140" height="95" rx="12" fill="white" fill-opacity="0.9" stroke="#E2E8F0" stroke-width="1" />
    <!-- Small graph in card -->
    <text x="12" y="24" font-family="'Poppins', sans-serif" font-weight="700" font-size="10" fill="#0F172A">Monthly Growth</text>
    <text x="12" y="38" font-family="'Inter', sans-serif" font-weight="700" font-size="14" fill="#22C55E">+142%</text>
    
    <!-- Mini sparkline chart -->
    <path d="M 15,75 Q 35,55 55,68 T 95,48 T 125,58" fill="none" stroke="url(#accent-grad)" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="125" cy="58" r="3" fill="#22C55E" />
  </g>

  <!-- Floating Card 2 (User / Mentor Profile - Wow-factor element 2) -->
  <g transform="translate(40, 210)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="150" height="75" rx="12" fill="white" fill-opacity="0.9" stroke="#E2E8F0" stroke-width="1" />
    
    <!-- Profile Avatar Ring -->
    <circle cx="28" cy="38" r="18" fill="#DBEAFE" />
    <path d="M 28,26 C 24,26 21,29 21,32 C 21,35 23,38 28,38 C 33,38 35,35 35,32 C 35,29 32,26 28,26 Z" fill="#2563EB" />
    <path d="M 16,48 C 16,42 20,41 28,41 C 36,41 40,42 40,48 Z" fill="#2563EB" />
    <circle cx="38" cy="46" r="5" fill="#22C55E" stroke="white" stroke-width="1.5" /> <!-- online status -->

    <!-- Bio -->
    <text x="56" y="32" font-family="'Poppins', sans-serif" font-weight="700" font-size="9" fill="#0F172A">Kushagra (Mentor)</text>
    <text x="56" y="44" font-family="'Inter', sans-serif" font-weight="500" font-size="8" fill="#64748B">C++ &amp; DSA Specialist</text>
    <text x="56" y="56" font-family="'Inter', sans-serif" font-weight="700" font-size="8" fill="#2563EB">Active Now</text>
  </g>

  <!-- Floating Elements (Brackets, Gears, Tech Bubbles) -->
  <!-- Gear SVG -->
  <g transform="translate(70, 70)" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5">
    <path d="M 20,14 C 18,14 17,13 16.5,12 C 16,11 16.5,9.5 17.5,9 C 18,8.5 18,7.5 17.5,7 C 17,6.5 16,6.5 15.5,7 C 15,8 13.5,8.5 12.5,8 C 11.5,7.5 11.5,6 11.5,4 C 11.5,3 10.5,2 9.5,2 C 8.5,2 7.5,3 7.5,4 C 7.5,6 7.5,7.5 6.5,8 C 5.5,8.5 4,8 3.5,7 C 3,6.5 2,6.5 1.5,7 C 1,7.5 1,8.5 1.5,9 C 2.5,9.5 3,11 2.5,12 C 2,13 1,14 1,14" fill="none" stroke-linecap="round" />
    <circle cx="9.5" cy="9.5" r="3" fill="#94A3B8" stroke="none" />
  </g>
  
  <!-- Code Symbols floating -->
  <!-- &lt;/&gt; Code Symbol -->
  <g transform="translate(390, 240) rotate(15)">
    <rect x="0" y="0" width="54" height="36" rx="8" fill="url(#purple-grad)" />
    <text x="11" y="24" font-family="'Poppins', sans-serif" font-weight="700" font-size="16" fill="white">&lt;/&gt;</text>
  </g>

  <!-- 3D style floating sphere 1 -->
  <circle cx="430" cy="180" r="10" fill="url(#primary-grad)" filter="url(#glow)" />
  
  <!-- 3D style floating sphere 2 -->
  <circle cx="100" cy="330" r="7" fill="url(#accent-grad)" filter="url(#glow)" />

  <!-- 3D style floating sphere 3 (small) -->
  <circle cx="280" cy="50" r="5" fill="url(#purple-grad)" />

</svg>
